<nav class="topnav no-print" role="navigation">
    <a class="brand" href="/">Songs</a>
    <a href="/artists">Artists</a>
    <a href="/admin">Admin</a>
    <button type="button" class="btn ghost square" title="Toggle theme" onclick="toggleTheme()" style="margin-left:auto">🌓</button>
</nav>
<div class="page">
    <h1>Song Api Console</h1>

    <ul id="services" class="flex gap-2" style="list-style:none;padding:0" role="navigation">
        <li><a class="btn btn-secondary" href="#searchApi">Search</a></li>
        <li><a class="btn btn-secondary" href="#get">Get</a></li>
        <li><a class="btn btn-secondary" href="#create">Create</a></li>
        <li><a class="btn btn-secondary" href="#update">Update</a></li>
        <li><a class="btn btn-secondary" href="#delete">Delete</a></li>
    </ul>

    <div id="searchApi" class="action-form">
        <form>
            <div class="form-group">
                <label for="search-query">Query</label>
                <input class="dialog-input" type="text" name="query" id="search-query">
            </div>
            <div class="form-group">
                <label for="search-content-type">Content Type</label>
                <select class="dialog-input" name="contentType" id="search-content-type">
                    <option value="text/plain">text</option>
                    <option value="text/html">html</option>
                </select>
            </div>
            <button class="btn btn-primary" name="search">Search</button>
        </form>
    </div>

    <div id="get" class="action-form">
        <form>
            <div class="form-group">
                <label for="get-id">Id</label>
                <input class="dialog-input" type="text" name="id" id="get-id">
            </div>
            <div class="form-group">
                <label for="get-content-type">Content Type</label>
                <select class="dialog-input" name="contentType" id="get-content-type">
                    <option value="text/plain">text</option>
                    <option value="text/html">html</option>
                </select>
            </div>
            <button class="btn btn-primary" name="get">Get</button>
        </form>
    </div>

    <div id="create" class="action-form">
        <form>
            <div class="form-group">
                <label for="create-songdata">Song Data</label>
                <textarea class="dialog-input console-songdata" id="create-songdata" rows="12" wrap="off" spellcheck="false"></textarea>
            </div>
            <button class="btn btn-primary" name="create">Create</button>
        </form>
    </div>

    <div id="update" class="action-form">
        <form>
            <div class="form-group">
                <label for="update-id">Id</label>
                <input class="dialog-input" type="text" name="id" id="update-id">
            </div>
            <div class="form-group">
                <label for="update-songdata">Song Data</label>
                <textarea class="dialog-input console-songdata" id="update-songdata" rows="12" wrap="off" spellcheck="false"></textarea>
            </div>
            <button class="btn btn-primary" name="update">Update</button>
        </form>
    </div>

    <div id="delete" class="action-form">
        <form>
            <div class="form-group">
                <label for="delete-id">Id</label>
                <input class="dialog-input" type="text" name="id" id="delete-id">
            </div>
            <button class="btn btn-danger" name="delete">Delete</button>
        </form>
    </div>

    <div class="form-group">
        <label for="result">Result</label>
        <pre id="result" class="code-block" style="min-height:8rem;overflow:auto"></pre>
    </div>
</div>

<script type="module" src="/js/consoleApi.js"></script>
